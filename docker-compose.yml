# `db`/`db-init` (profile `local-db`) stand in for RDS during local dev.
# Production / EC2 with RDS: set DATABASE_URL in `.env` and run
# `docker compose up` (app only). Local bundled SQL Server:
# `docker compose --profile local-db up`. `app` hardening: read-only rootfs (tmpfs
# for upload spooling), all capabilities dropped, non-root UID. `db` needs
# NET_BIND_SERVICE added back despite not binding a privileged port: the
# sqlservr binary has cap_net_bind_service as a *file* capability, which the
# kernel won't grant at exec time unless it's in the caller's capability
# bounding set. `db-init` runs one sqlcmd statement to create the database
# on first boot (no POSTGRES_DB-style env var equivalent for SQL Server).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: file-backup-service:latest
    ports:
      - "80:8000"   # host:80 (public) -> container:8000 (unprivileged, non-root)
    environment:
      APP_ENV: ${APP_ENV:-poc}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA}
      S3_BUCKET_ARCHIVES: ${S3_BUCKET_ARCHIVES}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-mssql+pymssql://sa:${MSSQL_SA_PASSWORD}@db:1433/${MSSQL_DB:-filebackup}}
    depends_on:
      db:
        condition: service_healthy
        required: false
      db-init:
        condition: service_completed_successfully
        required: false
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  db:
    profiles: ["local-db"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    volumes:
      - db-data:/var/opt/mssql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-C", "-N", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Not published to the host: only reachable from `app`/`db-init` over
    # the compose-internal network, same posture as RDS being VPC-private.

  db-init:
    profiles: ["local-db"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd"]
    command:
      - "-S"
      - "db"
      - "-U"
      - "sa"
      - "-P"
      - "${MSSQL_SA_PASSWORD}"
      - "-C"
      - "-N"
      - "-Q"
      - "IF DB_ID('${MSSQL_DB:-filebackup}') IS NULL CREATE DATABASE [${MSSQL_DB:-filebackup}];"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"

volumes:
  db-data:
