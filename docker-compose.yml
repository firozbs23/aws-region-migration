# Production / EC2: copy .env.example to .env, set DATABASE_URL to your RDS
# endpoint, then `docker compose up`. Database is AWS RDS SQL Server only --
# no bundled db container. `app` hardening: read-only rootfs (tmpfs for upload
# spooling), all capabilities dropped, non-root UID.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: file-backup-service:latest
    ports:
      - "80:8000"   # host:80 (public) -> container:8000 (unprivileged, non-root)
    environment:
      APP_ENV: ${APP_ENV:-poc}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA}
      S3_BUCKET_ARCHIVES: ${S3_BUCKET_ARCHIVES}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env to your RDS endpoint}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
