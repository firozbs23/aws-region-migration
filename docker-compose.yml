# Production / EC2: copy .env.example to .env, set DB_PASSWORD to your RDS
# master password, then `docker compose up`. Database is AWS RDS SQL Server.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: file-backup-service:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-poc}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA}
      S3_BUCKET_ARCHIVES: ${S3_BUCKET_ARCHIVES}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      DB_HOST: ${DB_HOST:-file-backup-db.c9g4u6ekudby.ap-southeast-1.rds.amazonaws.com}
      DB_PORT: ${DB_PORT:-1433}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env to your RDS master password}
      DB_NAME: ${DB_NAME:-filebackup}
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
