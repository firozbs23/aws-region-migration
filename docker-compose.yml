# Production / EC2: copy .env.example to .env, fill in values, then
# `docker compose up`. All config comes from .env via env_file only --
# do NOT export AWS_* in your shell or they used to override this file.

services:
  app:
    container_name: file-server
    build:
      context: .
      dockerfile: Dockerfile
    image: file-backup-service:latest
    env_file:
      - .env
    ports:
      - "80:8000"
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 5
